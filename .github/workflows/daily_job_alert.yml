name: Daily GIS Job Alerts

on:
  schedule:
    # 11:00 UTC = 6:00 AM CDT (UTC-5) / 5:00 AM CST (UTC-6)
    - cron: '0 11 * * *'
  workflow_dispatch:  # manual trigger for testing

jobs:
  send-alerts:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit seen_jobs.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore seen-jobs cache
        uses: actions/cache@v4
        with:
          path: data/seen_jobs.json
          key: seen-jobs-${{ github.run_id }}
          restore-keys: |
            seen-jobs-

      - name: Ensure data directory exists
        run: mkdir -p data && touch data/seen_jobs.json

      - name: Run job alert pipeline
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}
          USAJOBS_EMAIL: ${{ secrets.USAJOBS_EMAIL }}
        run: python src/main.py

      - name: Commit updated seen-jobs cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen_jobs.json
          git diff --staged --quiet || git commit -m "chore: update seen-jobs cache [skip ci]"
          git push
